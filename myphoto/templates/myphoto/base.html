{% load tailwind_cli %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Track Me{% endblock %}</title>
    {% tailwind_css %}
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-8">
                    <h1 class="text-2xl font-bold text-gray-800">Track Me</h1>
                    <div class="flex space-x-4">
                        <a href="{% url 'myphoto:photo_list' %}" class="text-gray-700 hover:text-primary px-3 py-2 rounded-md text-sm font-medium {% if request.resolver_match.url_name == 'photo_list' %}bg-gray-100 text-primary{% endif %}">
                            Geo Tag
                        </a>
                        <a href="{% url 'myphoto:footprints' %}" class="text-gray-700 hover:text-primary px-3 py-2 rounded-md text-sm font-medium {% if request.resolver_match.url_name == 'footprints' %}bg-gray-100 text-primary{% endif %}">
                            Footprints
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-white shadow-lg mt-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <p class="text-center text-gray-600 text-sm">
                Track Me &copy; 2025
            </p>
        </div>
    </footer>
</body>
</html>
