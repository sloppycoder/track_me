<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Build a timeline</title>
  <style>
    :root {
      --accent: #4285f4;
      --panel-bg: #ffffff;
      --ink: #1a1a1a;
      --muted: #6b7280;
      --line: #e3e6ea;
      --page: #f2f4f7;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body { font: 14px/1.45 system-ui, sans-serif; color: var(--ink); background: var(--page);
      min-height: 100vh; }

    header { background: var(--accent); color: #fff; padding: .7rem 1.1rem;
      display: flex; align-items: baseline; gap: .6rem; }
    header a.back { color: #fff; text-decoration: none; opacity: .9; }
    header h1 { font-size: 1rem; font-weight: 600; margin: 0; }

    .wrap { max-width: 60rem; margin: 1.4rem auto; padding: 0 1.1rem;
      display: grid; grid-template-columns: 20rem 1fr; gap: 1.4rem; align-items: start; }
    @media (max-width: 720px) { .wrap { grid-template-columns: 1fr; } }

    .card { background: var(--panel-bg); border: 1px solid var(--line); border-radius: .7rem;
      box-shadow: 0 2px 10px #0001; }
    form.card { padding: 1rem 1.1rem 1.1rem; }

    .row { margin-bottom: .95rem; }
    label.field { display: block; font-size: .74rem; color: var(--muted); margin-bottom: .3rem;
      text-transform: uppercase; letter-spacing: .02em; }
    input[type=text], input[type=date] { width: 100%; padding: .45rem .55rem; font: inherit;
      border: 1px solid var(--line); border-radius: .45rem; background: transparent; color: inherit; }
    input:focus { outline: none; border-color: var(--accent); }
    .dates { display: flex; gap: .55rem; }
    .dates > div { flex: 1; min-width: 0; }

    .rowhead { display: flex; justify-content: space-between; align-items: baseline; }
    .val { font-size: .8rem; color: var(--muted); font-variant-numeric: tabular-nums; }
    input[type=range] { width: 100%; accent-color: var(--accent); margin: .2rem 0 0; }
    .row.disabled { opacity: .4; pointer-events: none; }

    .seg { display: inline-flex; border: 1px solid var(--line); border-radius: .45rem; overflow: hidden; }
    .seg button { border: 0; background: transparent; padding: .32rem .8rem; font: inherit;
      font-size: .82rem; cursor: pointer; color: var(--muted); }
    .seg button.on { background: var(--accent); color: #fff; }
    .seg button + button { border-left: 1px solid var(--line); }

    #regions { display: flex; flex-wrap: wrap; gap: .3rem; }
    .chip { border: 1px solid var(--line); border-radius: 1rem; padding: .2rem .6rem; font-size: .78rem;
      cursor: pointer; color: var(--muted); background: transparent; user-select: none; }
    .chip.on { background: var(--accent); color: #fff; border-color: var(--accent); }
    #regions .none { color: var(--muted); font-size: .78rem; }

    #save { width: 100%; padding: .55rem; font: inherit; font-weight: 600; cursor: pointer;
      background: var(--accent); color: #fff; border: 0; border-radius: .45rem; margin-top: .2rem; }
    #save:disabled { opacity: .5; cursor: default; }
    #save-status { font-size: .78rem; color: var(--muted); margin-top: .4rem; min-height: 1rem; }
    #save-status.err { color: #b00; }

    /* --- summary --- */
    #summary { padding: 1rem 1.1rem 1.2rem; position: relative; }
    #summary.stale { opacity: .55; }
    #summary h2 { font-size: .8rem; text-transform: uppercase; letter-spacing: .03em;
      color: var(--muted); margin: 0 0 .8rem; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: .7rem; margin-bottom: 1.1rem; }
    @media (max-width: 480px) { .stats { grid-template-columns: repeat(2, 1fr); } }
    .stat { background: var(--page); border-radius: .55rem; padding: .6rem .7rem; }
    .stat .num { font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums;
      line-height: 1.1; }
    .stat .cap { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .02em; }

    table { width: 100%; border-collapse: collapse; font-size: .86rem; }
    th, td { text-align: left; padding: .4rem .5rem; border-bottom: 1px solid var(--line);
      vertical-align: baseline; }
    th { font-size: .7rem; text-transform: uppercase; letter-spacing: .02em; color: var(--muted);
      font-weight: 600; }
    td.n, td.photos { font-variant-numeric: tabular-nums; color: var(--muted); }
    td.photos { text-align: right; }
    th.photos { text-align: right; }
    td.place { font-weight: 600; }
    .tbl-wrap { overflow-x: auto; }
    #empty { color: var(--muted); padding: 1.4rem 0; text-align: center; }
    #err { color: #b00; padding: 1rem 0; }
  </style>
</head>
<body>
  <header>
    <a class="back" href="/" title="All timelines">&larr;</a>
    <h1>Build a timeline</h1>
  </header>

  <div class="wrap">
    <form class="card" id="form" autocomplete="off">
      <div class="row">
        <label class="field" for="title">Title</label>
        <input type="text" id="title" placeholder="e.g. Countries visited in 2019">
      </div>

      <div class="row">
        <label class="field">Date range</label>
        <div class="dates">
          <div><input type="date" id="start"></div>
          <div><input type="date" id="end"></div>
        </div>
      </div>

      <div class="row">
        <label class="field">Level</label>
        <span class="seg" id="level-seg">
          <button type="button" data-level="country" class="on">Country</button>
          <button type="button" data-level="city">City</button>
        </span>
      </div>

      <div class="row" id="mergekm-row">
        <div class="rowhead">
          <label class="field" for="merge-km">Metro merge radius</label>
          <span class="val"><span id="merge-km-val">50</span> km</span>
        </div>
        <input type="range" id="merge-km" min="5" max="200" step="5" value="50">
      </div>

      <div class="row">
        <div class="rowhead">
          <label class="field" for="min-hours">Blip smoothing</label>
          <span class="val"><span id="min-hours-val">24</span> h</span>
        </div>
        <input type="range" id="min-hours" min="0" max="72" step="1" value="24">
      </div>

      <div class="row">
        <label class="field">Regions</label>
        <div id="regions"><span class="none">all</span></div>
      </div>

      <div class="row" style="margin-bottom:0">
        <button type="button" id="save" disabled>Save timeline</button>
        <div id="save-status"></div>
      </div>
    </form>

    <div class="card" id="summary">
      <h2>Trip summary</h2>
      <div class="stats">
        <div class="stat"><div class="num" id="st-stays">—</div><div class="cap">Stays</div></div>
        <div class="stat"><div class="num" id="st-photos">—</div><div class="cap">Photos</div></div>
        <div class="stat"><div class="num" id="st-places">—</div><div class="cap" id="st-places-cap">Countries</div></div>
        <div class="stat"><div class="num" id="st-days">—</div><div class="cap">Days</div></div>
      </div>
      <div class="tbl-wrap">
        <table id="stays-table" hidden>
          <thead><tr><th class="n">#</th><th>Dates</th><th>Place</th><th class="photos">Photos</th></tr></thead>
          <tbody id="stays-body"></tbody>
        </table>
      </div>
      <div id="empty">Pick a date range to see the aggregation.</div>
      <div id="err" hidden></div>
    </div>
  </div>

  <script>
    const PREFILL = {{ build | tojson }};
    const DAY = 86400000;

    let level = "country", mergeKm = 50, minHours = 24;
    let selectedRegions = new Set();   // empty = all
    let lastStays = [];

    const $ = id => document.getElementById(id);
    const regionNames = (() => {
      try { return new Intl.DisplayNames(["en"], { type: "region" }); } catch (e) { return null; }
    })();
    const countryName = cc => (cc && regionNames && regionNames.of(cc)) || cc || "Unknown";

    // The date inputs hold inclusive days. load_points treats `end` as exclusive,
    // so the query/saved end is the picked end + 1 day.
    const qStart = () => $("start").value;
    function qEnd() {
      const v = $("end").value;
      if (!v) return "";
      const d = new Date(v + "T00:00Z");
      d.setUTCDate(d.getUTCDate() + 1);
      return d.toISOString().slice(0, 10);
    }

    // ---- summary rendering -----------------------------------------------
    function renderSummary(stays) {
      lastStays = stays;
      const table = $("stays-table"), body = $("stays-body"), empty = $("empty");
      const totalPhotos = stays.reduce((a, s) => a + (s.photo_count || 0), 0);
      const places = new Set(stays.map(s => s.label)).size;
      let days = 0;
      if (stays.length) {
        const from = new Date(stays[0].from + "T00:00Z").getTime();
        const to = new Date(stays[stays.length - 1].to + "T00:00Z").getTime();
        days = Math.round((to - from) / DAY) + 1;
      }
      $("st-stays").textContent = stays.length;
      $("st-photos").textContent = totalPhotos.toLocaleString();
      $("st-places").textContent = places;
      $("st-places-cap").textContent = level === "city" ? "Cities" : "Countries";
      $("st-days").textContent = days;

      body.innerHTML = "";
      if (!stays.length) {
        table.hidden = true;
        empty.hidden = false;
        empty.textContent = "No stays for these settings.";
      } else {
        const frag = document.createDocumentFragment();
        stays.forEach((s, i) => {
          const tr = document.createElement("tr");
          const rng = s.from === s.to ? s.from : `${s.from} – ${s.to}`;
          const nTd = document.createElement("td"); nTd.className = "n"; nTd.textContent = i + 1;
          const dTd = document.createElement("td"); dTd.textContent = rng;
          const pTd = document.createElement("td"); pTd.className = "place";
          pTd.textContent = level === "country" ? countryName(s.label) : s.label;
          const cTd = document.createElement("td"); cTd.className = "photos";
          cTd.textContent = (s.photo_count || 0).toLocaleString();
          tr.append(nTd, dTd, pTd, cTd);
          frag.appendChild(tr);
        });
        body.appendChild(frag);
        table.hidden = false;
        empty.hidden = true;
      }
      updateSaveEnabled();
    }

    function updateSaveEnabled() {
      $("save").disabled = !($("title").value.trim() && lastStays.length);
    }

    // ---- preview (server-computed stays) ---------------------------------
    let previewTimer = null, previewSeq = 0;
    function requestPreview() {
      if (previewTimer) clearTimeout(previewTimer);
      previewTimer = setTimeout(runPreview, 200);
    }
    async function runPreview() {
      const start = qStart(), end = qEnd();
      if (!start || !end || start >= end) return;
      const seq = ++previewSeq;
      $("summary").classList.add("stale");
      const q = new URLSearchParams({ start, end, level,
        merge_km: String(mergeKm), min_hours: String(minHours) });
      selectedRegions.forEach(cc => q.append("region", cc));
      let data;
      try {
        const res = await fetch(`/api/preview?${q}`, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
      } catch (e) {
        if (seq === previewSeq) showError(`Preview failed: ${e.message}`);
        return;
      }
      if (seq !== previewSeq) return; // superseded
      $("summary").classList.remove("stale");
      $("err").hidden = true;
      renderSummary(data.stays || []);
    }

    function showError(msg) {
      $("summary").classList.remove("stale");
      $("stays-table").hidden = true;
      $("empty").hidden = true;
      const el = $("err"); el.hidden = false; el.textContent = msg;
    }

    // ---- controls ---------------------------------------------------------
    function syncLevel() {
      document.querySelectorAll("#level-seg button")
        .forEach(b => b.classList.toggle("on", b.dataset.level === level));
      $("mergekm-row").classList.toggle("disabled", level !== "city");
    }

    function buildRegionChips(countries) {
      const box = $("regions");
      box.innerHTML = "";
      if (!countries.length) { box.innerHTML = `<span class="none">all</span>`; return; }
      for (const cc of countries) {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "chip" + (selectedRegions.has(cc) ? " on" : "");
        b.textContent = cc;
        b.title = countryName(cc);
        b.addEventListener("click", () => {
          if (selectedRegions.has(cc)) selectedRegions.delete(cc);
          else selectedRegions.add(cc);
          b.classList.toggle("on");
          requestPreview();
        });
        box.appendChild(b);
      }
    }

    function setupControls() {
      document.querySelectorAll("#level-seg button").forEach(btn => {
        btn.addEventListener("click", () => { level = btn.dataset.level; syncLevel(); requestPreview(); });
      });
      const mk = $("merge-km");
      mk.addEventListener("input", () => { mergeKm = Number(mk.value); $("merge-km-val").textContent = mergeKm; requestPreview(); });
      const mh = $("min-hours");
      mh.addEventListener("input", () => { minHours = Number(mh.value); $("min-hours-val").textContent = minHours; requestPreview(); });
      $("start").addEventListener("change", requestPreview);
      $("end").addEventListener("change", requestPreview);
      $("title").addEventListener("input", updateSaveEnabled);
      $("save").addEventListener("click", save);
    }

    // ---- boot ------------------------------------------------------------
    async function init() {
      setupControls();

      // apply prefill (from /build/<id>) before the first load
      if (PREFILL) {
        if (PREFILL.title) $("title").value = PREFILL.title;
        if (PREFILL.level) level = PREFILL.level;
        if (PREFILL.merge_km != null) mergeKm = PREFILL.merge_km;
        if (PREFILL.min_hours != null) minHours = PREFILL.min_hours;
        if (Array.isArray(PREFILL.region)) selectedRegions = new Set(PREFILL.region);
        $("merge-km").value = mergeKm; $("merge-km-val").textContent = mergeKm;
        $("min-hours").value = minHours; $("min-hours-val").textContent = minHours;
      }
      syncLevel();

      let range;
      try {
        const res = await fetch("/api/range", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        range = await res.json();
      } catch (e) {
        return showError(`Could not load catalog: ${e.message}`);
      }
      if (!range.min) return showError("No located photos in the catalog yet. Ingest + geocode first.");

      // bound the date pickers to the catalog span; default to the full span
      const startEl = $("start"), endEl = $("end");
      startEl.min = endEl.min = range.min;
      startEl.max = endEl.max = range.max;
      startEl.value = range.min;
      endEl.value = range.max;

      // prefill overrides the defaults (stored end is exclusive → pull back 1 day)
      if (PREFILL && PREFILL.start) startEl.value = PREFILL.start;
      if (PREFILL && PREFILL.end) {
        const d = new Date(PREFILL.end + "T00:00Z"); d.setUTCDate(d.getUTCDate() - 1);
        endEl.value = d.toISOString().slice(0, 10);
      }

      buildRegionChips(range.countries || []);
      runPreview();
    }

    async function save() {
      const btn = $("save"), statusEl = $("save-status");
      const title = $("title").value.trim();
      if (!title || !lastStays.length) return;
      const id = (PREFILL && PREFILL.id) || slugify(title);
      btn.disabled = true; statusEl.className = ""; statusEl.textContent = "Saving…";
      try {
        const res = await fetch("/api/timeline", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            id, title, start: qStart(), end: qEnd(), level,
            merge_km: mergeKm, min_hours: minHours, region: [...selectedRegions],
          }),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || `HTTP ${res.status}`);
        window.location.href = data.url; // → /t/<id>
      } catch (e) {
        statusEl.className = "err"; statusEl.textContent = `Save failed: ${e.message}`;
        btn.disabled = false;
      }
    }

    // Title → filename-safe id (matches the server's ^[a-z0-9][a-z0-9_-]*$).
    function slugify(s) {
      const out = s.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
      return out || "timeline";
    }

    init();
  </script>
</body>
</html>
